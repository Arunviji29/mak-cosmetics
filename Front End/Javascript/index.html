<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmetics</title>
</head>

<body>

<!-- ✅ BUTTON MUST BE HERE -->
<button onclick="addProduct()">Add Product</button>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAK7fgo0x1wh3bVB8WTGjlKN7M3lUmdn_k",
  authDomain: "makcosmetics-19118.firebaseapp.com",
  projectId: "makcosmetics-19118",
  storageBucket: "makcosmetics-19118.firebasestorage.app",
  messagingSenderId: "770446803728",
  appId: "1:770446803728:web:b4490b0441080298c0db95"
};

// ✅ IMPORTANT (YOU MISSED THIS)
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

console.log("Firebase connected");

// ✅ ADD PRODUCT
async function addProduct() {
  let name = prompt("Enter product name");
  let price = prompt("Enter price");

  if (!name || !price) {
    alert("Enter valid details");
    return;
  }

  await db.collection("products").add({
    name: name,
    price: Number(price)
  });

  alert("Product saved!");
}

// ✅ LOAD PRODUCTS
async function loadProducts() {
  console.log("Loading products...");

  const snapshot = await db.collection("products").get();

  snapshot.forEach(doc => {
    const data = doc.data();

    let div = document.createElement("div");
    div.innerHTML = `
      <h3>${data.name}</h3>
      <p>₹${data.price}</p>
      <button onclick="addToCart('${data.name}', ${data.price})">
        Add to Cart
      </button>
      <hr>
    `;

    document.body.appendChild(div);
  });
}

// ✅ CART
let cart = [];

function addToCart(name, price) {
  cart.push({ name, price });
  alert(name + " added to cart");
}

// ✅ RUN
loadProducts();
async function placeOrder() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  await db.collection("orders").add({
    items: cart,
    createdAt: new Date()
  });

  alert("Order placed!");

  cart = [];
}
async function placeOrder() {
  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let total = cart.reduce((sum, item) => sum + item.price, 0) * 100;

  var options = {
    key: "YOUR_RAZORPAY_KEY", // 🔴 replace this
    amount: total,
    currency: "INR",
    name: "Glow Beauty",
    description: "Order Payment",

    handler: async function (response) {

      // ✅ SAVE ORDER AFTER PAYMENT SUCCESS
      await db.collection("orders").add({
        items: cart,
        paymentId: response.razorpay_payment_id,
        createdAt: new Date()
      });

      alert("Payment Successful & Order Saved!");

      cart = [];
    }
  };

  var rzp = new Razorpay(options);
  rzp.open();
}
</script>
<button onclick="placeOrder()">Place Order</button>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>
</html>
