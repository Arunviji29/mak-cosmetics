<!doctype html>
<html>
  <head>
    <title>MAK Cosmetics</title>
    <link rel="icon" href="logo.png" />

    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f7f7f7;
        margin: 0;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #ff2e7a;
        color: white;
        padding: 15px 20px;
      }

      .hero {
        background:
          linear-gradient(rgba(255, 46, 122, 0.7), rgba(255, 46, 122, 0.7)),
          url("https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?q=80&w=1200");

        background-size: cover;
        background-position: center;

        color: white;

        text-align: center;

        padding: 80px 20px;
      }

      .hero h1 {
        font-size: 45px;
        margin-bottom: 10px;
      }

      .hero p {
        font-size: 20px;
      }

      .categories {
        display: flex;
        gap: 20px;
        padding: 20px;
        overflow-x: auto;
      }

      .category-card {
        min-width: 250px;
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .category-card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }

      .category-card h3 {
        padding: 15px;
      }

      .container {
        padding: 20px;
      }

      input,
      select {
        padding: 10px;
        margin: 10px 5px;
        border-radius: 6px;
        border: 1px solid #f6f2f6;
      }

      button {
        background: #ff2e7a;
        color: rgb(239, 235, 238);
        border: none;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
      }

      .card {
        background: white;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
        text-align: center;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }
      .card img:hover {
        transform: scale(1.05);
      }

      .card h3 {
        margin-top: 15px;
      }

      .card p {
        font-size: 18px;
        font-weight: bold;
        color: #ff2e7a;
      }
      .whatsapp {
        position: fixed;
        bottom: 20px;
        right: 20px;

        width: 60px;
        height: 60px;

        background: #25d366;
        color: white;

        border-radius: 50%;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 30px;

        text-decoration: none;

        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .dark {
        background: #111;
        color: white;
      }

      .dark .card,
      .dark .category-card,
      .dark #cart div {
        background: #1e1e1e;
        color: white;
      }

      .dark input,
      .dark select {
        background: #222;
        color: white;
        border: 1px solid #444;
      }
      .dark header {
        background: #000;
      }

      .dark #orders div {
        background: #1e1e1e !important;
        color: white;
      }
      #loader {
        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background: white;

        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 9999;

        font-size: 24px;
        font-weight: bold;

        color: #ff2e7a;
      }
      .modal {
        display: none;

        position: fixed;

        z-index: 9999;

        left: 0;
        top: 0;

        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.6);

        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: white;

        padding: 30px;

        border-radius: 20px;

        width: 300px;

        display: flex;
        flex-direction: column;
        gap: 15px;

        text-align: center;
      }

      .close {
        font-size: 30px;

        cursor: pointer;

        text-align: right;
      }
      .menu-btn {

  font-size: 30px;

  cursor: pointer;
}

.sidebar {

  height: 100%;

  width: 0;

  position: fixed;

  z-index: 99999;

  top: 0;
  left: 0;

  background: #ff2e7a;

  overflow-x: hidden;

  transition: 0.4s;

  padding-top: 60px;
}

.sidebar a {

  padding: 15px 25px;

  text-decoration: none;

  font-size: 20px;

  color: white;

  display: block;
}

.sidebar .closebtn {

  position: absolute;

  top: 10px;
  right: 20px;

  font-size: 35px;
}
    </style>
  </head>

  <body>
    <header>
       <div
    style="
      display:flex;
      align-items:center;

    "
  >

    <span

    >

    </span>

      <h2>MAK Cosmetics</h2>
      <div>
        <button onclick="openLoginModal()">Login</button>

    <div id="sidebar" class="sidebar">

        ×
      </a>

      <a href="#">Home</a>

      <a href="#products"> Products </a>

      <a href="#cart"> Cart </a>

      <a href="#orders"> Orders </a>

      <a href="https://wa.me/918056282330" target="_blank"> WhatsApp </a>
    </div>
    <span id="userInfo"></span>
    <div class="hero">
      <h1>Glow With MAK Cosmetics ✨</h1>

      <p>Makeup • Skincare • Haircare • Jewelry</p>
      <div class="categories">
        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?q=80&w=500"
          />
          <h3>Makeup</h3>
        </div>
        <div class="category-card">
          <img
            src="https://tse1.mm.bing.net/th/id/OIP.UvXDzGL4oejYJlIA5vG0DAHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"
          />
          <h3>Skincare</h3>
        </div>
        <div class="category-card">
          <img
            src="https://th.bing.com/th/id/OIP.wkqB6VbtVmuY1T0BoHI0vQHaE7?w=305&h=203&c=7&r=0&o=7&dpr=2&pid=1.7&rm=3"
          />
          <h3>Haircare</h3>
        </div>

        <div class="category-card">
          <img
            src="https://cdn.pixabay.com/photo/2024/03/27/19/39/ai-generated-8659741_1280.jpg"

          <h3>Jewelry</h3>

    </div>
    <div class="container">
      <input
        type="text"
        id="search"
        placeholder="Search..."
        onkeyup="loadProducts()"
      />

      <select id="category" onchange="loadProducts()">
        <option value="">All</option>
        <option value="makeup">Makeup</option>
        <option value="skincare">Skincare</option>
        <option value="hair">Hair</option>

      </select>

      <button onclick="addProduct()">Add Product</button>
      <button onclick="placeOrder()">Checkout</button>

      <div id="products" class="grid"></div>
      <h3>🛒 Cart</h3>
      <h3>Customer Details</h3>

      <input type="text" id="customerName" placeholder="Full Name" />

      <input type="text" id="customerPhone" placeholder="Phone Number" />

      <input type="text" id="customerAddress" placeholder="Address" />

      <input type="text" id="trackOrderId" placeholder="Enter Order ID" />

    <h3>🛒 Cart</h3>

    <h3>📦 Orders</h3>

    <div id="orders"></div>
    <div id="loader">Loading Products...</div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAK7fgo0x1wh3bVB8WTGjlKN7M3lUmdn_k",
        authDomain: "makcosmetics-19118.firebaseapp.com",
        projectId: "makcosmetics-19118",
        storageBucket: "makcosmetics-19118.firebasestorage.app",
        messagingSenderId: "770446803728",
        appId: "1:770446803728:web:b4490b0441080298c0db95",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();
      const storage = firebase.storage();

      let cart = [];
      let wishlist = [];
      const ADMIN_EMAIL = "makcosmeticshop@gmail.com";
      let showingOrders = false;

      // AUTH
      // OPEN LOGIN MODAL
      function openLoginModal() {
        document.getElementById("loginModal").style.display = "flex";
      }

      // CLOSE LOGIN MODAL
      function closeLoginModal() {
        document.getElementById("loginModal").style.display = "none";
      }

      // GOOGLE LOGIN
      async function googleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();

        try {
          await firebase.auth().signInWithPopup(provider);

          closeLoginModal();

          alert("Google Login Success");

          loadProducts();
        } catch (err) {
          alert(err.message);
        }
      }

      // APPLE LOGIN
      async function appleLogin() {
        const provider = new firebase.auth.OAuthProvider("apple.com");

        try {
          await firebase.auth().signInWithPopup(provider);

          closeLoginModal();

          alert("Apple Login Success");

          loadProducts();
        } catch (err) {
          alert(err.message);
        }
      }

      // EMAIL LOGIN
      async function emailLogin() {
        const email = prompt("Enter Email");

        const pass = prompt("Enter Password");

        try {
          await firebase.auth().signInWithEmailAndPassword(email, pass);

          closeLoginModal();

          alert("Login Success");

          loadProducts();
        } catch (err) {
          if (err.code === "auth/user-not-found") {
            await firebase.auth().createUserWithEmailAndPassword(email, pass);

            closeLoginModal();

            alert("Account Created");
          } else {
            alert(err.message);
          }
        }
      }
      firebase.auth().onAuthStateChanged((user) => {
        const info = document.getElementById("userInfo");

        if (user) {
          info.innerHTML = "👋 " + user.email;
        } else {
          info.innerHTML = "";
        }
      });

      function logout() {
        firebase.auth().signOut();
      }

      // ADD PRODUCT
      async function addProduct() {
        const user = firebase.auth().currentUser;
        if (!user || user.email !== ADMIN_EMAIL) {
          alert("Admin only");
          return;
        }

        let name = prompt("Name");
        let price = prompt("Price");
        let category = prompt("Category");
        let stock = prompt("Stock Quantity");

        let input = document.createElement("input");
        input.type = "file";

        input.onchange = async (e) => {
          let file = e.target.files[0];

          const ref = storage.ref("products/" + file.name);
          await ref.put(file);

          const imageURL = await ref.getDownloadURL();

          await db.collection("products").add({
            name,
            price: Number(price),
            category,
            image: imageURL,
            stock: Number(stock),
          });

          alert("Added");
          loadProducts();
        };

        input.click();
      }
      async function deleteProduct(id) {
        const user = firebase.auth().currentUser;

        if (!user || user.email !== ADMIN_EMAIL) {
          alert("Admin only");
          return;
        }

        const ok = confirm("Delete product?");

        if (!ok) return;

        await db.collection("products").doc(id).delete();

        alert("Deleted");

        loadProducts();
      }
      async function editProduct(id, oldName, oldPrice, oldCategory, oldStock) {
        const user = firebase.auth().currentUser;

        if (!user || user.email !== ADMIN_EMAIL) {
          alert("Admin only");
          return;
        }

        const name = prompt("Product Name", oldName);

        const price = prompt("Price", oldPrice);

        const category = prompt("Category", oldCategory);

        const stock = prompt("Stock", oldStock);

        await db
          .collection("products")
          .doc(id)
          .update({
            name,
            price: Number(price),
            category,
            stock: Number(stock),
          });

        alert("Product Updated");

        loadProducts();
      }

      // LOAD PRODUCTS
      async function loadProducts() {
        const container = document.getElementById("products");
        document.getElementById("loader").style.display = "flex";
        container.innerHTML = "";

        const search = document.getElementById("search").value.toLowerCase();
        const category = document.getElementById("category").value;

        const snap = await db.collection("products").get();

        snap.forEach((doc) => {
          let p = doc.data();

          if (
            (search && !p.name.toLowerCase().includes(search)) ||
            (category && p.category !== category)
          )
            return;

          let div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <img
  src="${p.image || "https://via.placeholder.com/150"}"
  onclick="window.open('${p.image}', '_blank')"
/>
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>

      <p>
        ${p.stock > 0 ? `In Stock (${p.stock})` : `Out of Stock`}
      </p>
            <button
        onclick="addToCart('${p.name}', ${p.price})"
        ${p.stock <= 0 ? "disabled" : ""}
      >

      ${
        firebase.auth().currentUser?.email === ADMIN_EMAIL
          ? `
        <button
        onclick="editProduct(
          '${doc.id}',
          '${p.name}',
          '${p.price}',
          '${p.category}',
          '${p.stock}'
        )"
        style="margin-top:10px;"
      >
        Edit
      </button>
        <button
          onclick="deleteProduct('${doc.id}')"
          style="background:red;margin-top:10px;"
        >
          Delete
        </button>`
          : ""
      }
          `;

          container.appendChild(div);
        });
        document.getElementById("loader").style.display = "none";
      }

      // CART
      function addToCart(name, price) {
        const existing = cart.find((i) => i.name === name);

        if (existing) {
          existing.qty += 1;
        } else {
          cart.push({
            name,
            price,
            qty: 1,
          });
        }

        renderCart();
      }

      function increaseQty(index) {
        cart[index].qty++;
        renderCart();
      }

      function decreaseQty(index) {
        if (cart[index].qty > 1) {
          cart[index].qty--;
        }

        renderCart();
      }

      function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
      }
      function addToWishlist(name) {

  if (
    wishlist.includes(name)
  ) {

    alert("Already in wishlist");

    return;
  }

  wishlist.push(name);

  alert(
    name + " added to wishlist ❤️"
  );

}

      function renderCart() {
        const cartDiv = document.getElementById("cart");

        cartDiv.innerHTML = "";

        let total = 0;

        cart.forEach((item, index) => {
          total += item.price * item.qty;

          cartDiv.innerHTML += `
              <div style="background:white;padding:10px;margin:10px 0;border-radius:10px;">

                <h4>${item.name}</h4>

                <button onclick="decreaseQty(${index})">-</button>

                <span style="margin:0 10px;">${item.qty}</span>

                <button onclick="increaseQty(${index})">+</button>

                <p>₹${item.price * item.qty}</p>

                <button onclick="removeItem(${index})">
                  Remove
                </button>

              </div>
            `;
        });

        cartDiv.innerHTML += `<h3>Total: ₹${total}</h3>`;
      }
      const BACKEND_URL = "https://mak-cosmetics.onrender.com";
      // PAYMENT
      async function placeOrder() {
        const customerName = document.getElementById("customerName").value;

        const customerPhone = document.getElementById("customerPhone").value;

        const customerAddress =
          document.getElementById("customerAddress").value;

        if (!customerName || !customerPhone || !customerAddress) {
          alert("Fill customer details");
          return;
        }

        if (cart.length === 0) {
          alert("Cart empty");
          return;
        }
        const customer_Name = prompt("Enter Your Name");

        const customer_Phone = prompt("Enter Phone Number");

        const customer_Address = prompt("Enter Delivery Address");

        let total = cart.reduce((s, i) => s + i.price * i.qty, 0) * 100;

        const res = await fetch(`${BACKEND_URL}/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: total }),
        });

        const order = await res.json();

        var options = {
          key: "rzp_test_SlI1qCPtzNiIzm",
          amount: order.amount,
          currency: "INR",
          order_id: order.id,

          method: {
            upi: true,
            card: true,
            netbanking: true,
            wallet: true,
          },

          handler: async function (response) {
            const verify = await fetch(`${BACKEND_URL}/verify-payment`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(response),
            });

            const result = await verify.json();

            if (result.status !== "success") {
              alert("Payment failed");
              return;
            }

            await db.collection("orders").add({
              orderId: "MAK" + Date.now(),
              customerName,
              customerPhone,
              customerAddress,

              items: cart,

              total: total / 100,

              user: firebase.auth().currentUser?.email || "guest",

              paymentId: response.razorpay_payment_id,

              createdAt: new Date(),
            });

            for (const item of cart) {
              const snap = await db
                .collection("products")
                .where("name", "==", item.name)
                .get();

              snap.forEach(async (doc) => {
                const product = doc.data();

                await db
                  .collection("products")
                  .doc(doc.id)
                  .update({
                    stock: product.stock - item.qty,
                  });
              });
            }

            confetti({
              particleCount: 200,
              spread: 100,
              origin: { y: 0.6 },
            });

            alert(
              "🎉 Order Successful!\n\n" +
                "Thank you for shopping with MAK Cosmetics 💖",
            );
            window.scrollTo({
              top: 0,
              behavior: "smooth",
            });
            cart = [];
            renderCart();
          },
        };

        new Razorpay(options).open();
      }

      loadProducts();

      async function viewOrders() {
        const user = firebase.auth().currentUser;

        if (!user || user.email !== ADMIN_EMAIL) {
          alert("Admin only");
          return;
        }

        const ordersDiv = document.getElementById("orders");

        ordersDiv.innerHTML = "";

        const snap = await db
          .collection("orders")
          .orderBy("createdAt", "desc")
          .get();

        snap.forEach((doc) => {
          const o = doc.data();

          ordersDiv.innerHTML += `
            <div style="
              background:white;
              padding:15px;
              margin:15px 0;
              border-radius:10px;
            ">

              <h4>${o.customerName}</h4>

              <p>${o.customerPhone}</p>

              <p>${o.customerAddress}</p>

              <p>
                ${o.items.map((i) => `${i.name} x ${i.qty}`).join("<br>")}
              </p>

            </div>
          `;
        });
      }
      function toggleDarkMode() {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          localStorage.setItem("darkMode", "enabled");
        } else {
          localStorage.setItem("darkMode", "disabled");
        }
      }

      async function loadOrders() {
        const user = firebase.auth().currentUser;

        if (!user || user.email !== ADMIN_EMAIL) {
          alert("Admin only");
          return;
        }

        const ordersDiv = document.getElementById("orders");

        if (showingOrders) {
          ordersDiv.innerHTML = "";
          showingOrders = false;
          return;
        }

        ordersDiv.innerHTML = "<h2>Loading Orders...</h2>";

        const snap = await db
          .collection("orders")
          .orderBy("createdAt", "desc")
          .get();

        ordersDiv.innerHTML = "<h2>Customer Orders</h2>";

        snap.forEach((doc) => {
          const order = doc.data();

          let itemsHTML = "";

          order.items.forEach((item) => {
            itemsHTML += `
              <p>
                ${item.name}
                x ${item.qty}
              </p>
            `;
          });

          ordersDiv.innerHTML += `

            <div style="
              background:white;
              padding:20px;
              margin:20px 0;
              border-radius:15px;
            ">
<h2>
  Order ID:
  ${order.orderId}
</h2>
              <h3>${order.customerName}</h3>

              <p>${order.customerPhone}</p>

              <p>${order.customerAddress}</p>

              <hr>

              ${itemsHTML}

              <h3>
                ₹${order.total}
              </h3>

            </div>

          `;
        });

        showingOrders = true;
      }
      async function trackOrder() {
        const orderId = document.getElementById("trackOrderId").value;

        if (!orderId) {
          alert("Enter Order ID");
          return;
        }

        const resultDiv = document.getElementById("trackingResult");

        resultDiv.innerHTML = "Searching...";

        const snap = await db
          .collection("orders")
          .where("orderId", "==", orderId)
          .get();

        if (snap.empty) {
          resultDiv.innerHTML = `
      <p>
        ❌ Order Not Found
      </p>
    `;

          return;
        }

        snap.forEach((doc) => {
          const order = doc.data();

          resultDiv.innerHTML = `

      <div style="
        background:white;
        padding:20px;
        margin-top:20px;
        border-radius:15px;
      ">

        <h3>
          ${order.orderId}
        </h3>

        <p>
          Customer:
          ${order.customerName}
        </p>

        <p>
          Payment:
          ✅ Successful
        </p>

        <p>
          Status:
          🚚 Processing
        </p>

        <p>
          Total:
          ₹${order.total}
        </p>

      </div>

    `;
        });
      }
      function openSidebar() {
        document.getElementById("sidebar").style.width = "260px";
      }

      function closeSidebar() {
        document.getElementById("sidebar").style.width = "0";
      }

      // existing code
